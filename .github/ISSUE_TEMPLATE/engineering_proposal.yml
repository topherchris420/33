name: Engineering proposal
description: Propose a scoped improvement, refactor, or validation step.
title: "[Proposal]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap, risk, or review need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the smallest useful change and any alternatives considered.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Safety or command-path impact
      options:
        - No safety or command-path impact
        - Documentation-only safety clarification
        - Changes command validation or interlock behavior
        - Changes actuator, arming, launch, or ignition behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence plan
      description: What tests, CI checks, bench artifacts, or docs will prove this is done?
    validations:
      required: true
