name: Project checks

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python docs and telemetry checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            Firmware/requirements.txt
            Firmware/requirements-test.txt
            Firmware/requirements-platformio.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Firmware/requirements-test.txt
      - name: Check generated protocol artifacts
        run: python tools/generate_protocol.py --check
      - name: Run tests
        run: python -m pytest tests Firmware/tests -q

  platformio-build:
    name: PlatformIO firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Firmware/requirements-platformio.txt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/lib
          key: ${{ runner.os }}-platformio-${{ hashFiles('Firmware/**/platformio.ini') }}
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Firmware/requirements-platformio.txt
      - name: Build rocket firmware
        run: pio run -d Firmware/Rocket
      - name: Build launcher firmware
        run: pio run -d Firmware/Launcher
