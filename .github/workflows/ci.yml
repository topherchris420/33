name: Project checks

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python docs and telemetry checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Firmware/requirements.txt pytest
      - name: Check generated protocol artifacts
        run: python tools/generate_protocol.py --check
      - name: Run tests
        run: python -m pytest tests Firmware/tests -q

  platformio-build:
    name: PlatformIO firmware build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio
      - name: Build rocket firmware
        run: pio run -d Firmware/Rocket
      - name: Build launcher firmware
        run: pio run -d Firmware/Launcher
